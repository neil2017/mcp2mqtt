mqtt:
  # MQTT服务器配置 - 使用EMQX公共测试服务器
  broker: "broker.emqx.io"  # EMQX公共测试服务器地址
  port: 1883  # TCP端口
  websocket_port: 8083  # WebSocket端口
  ssl_port: 8883  # SSL/TLS端口
  ws_ssl_port: 8084  # WebSocket Secure端口
  quic_port: 14567  # QUIC端口
  client_id: "mcp2mqtt_nas"  # 测试客户端ID
  username: ""  # 公共测试服务器不需要认证
  password: ""  # 公共测试服务器不需要认证
  keepalive: 60
  response_start_string: "CMD"  # 应答的开始字符串，用于验证响应

# MCP工具定义
tools:
  set_pwm:
    name: "set_pwm"
    description: "设置PWM频率，范围0-100"
    parameters:
      - name: "frequency"
        type: "integer"
        description: "PWM频率值(0-100)"
        required: true
    mqtt_topic: "mcp2mqtt/pwm"
    response_topic: "mcp2mqtt/pwm/response"
    response_format: "CMD PWM {frequency} OK"

  get_pico_info:
    name: "get_pico_info"
    description: "获取Pico开发板信息"
    parameters: []
    mqtt_topic: "mcp2mqtt/info"
    response_topic: "mcp2mqtt/info/response"
    response_format: "CMD INFO {info} OK"

  led_control:
    name: "led_control"
    description: "控制LED开关"
    parameters:
      - name: "state"
        type: "string"
        description: "LED状态(on/off)"
        required: true
        enum: ["on", "off"]
    mqtt_topic: "mcp2mqtt/led"
    response_topic: "mcp2mqtt/led/response"
    response_format: "CMD LED {state} OK"
    
# --- 修改开始：这里的led_control改为控制HA的灯 ---
  tuya_control:
    name: "tuya_control"
    description: "控制或查询楼梯灯开关状态 (连接到HA)。state=on/off 控制开关，state=query 查询当前状态"
    parameters:
      - name: "state"
        type: "string"
        description: "灯的状态(on/off/query)"
        required: true
        enum: ["on", "off", "query"]
    mqtt_topic: "ha/light/lou_ti_deng/set"       # 指向HA的控制频道
    response_topic: "ha/light/lou_ti_deng/state"  # 监听HA的反馈频道
    response_format: "{state}"                     # HA只需要收到纯文本的 'on' 或 'off'
  # --- 修改结束 ---

# 命令示例（用于测试）
commands:
  set_pwm:
    command: "PWM {frequency}"
    need_parse: true
    data_type: "ascii"
    prompts:
      - "把PWM调到最大"  # 返回 CMD PWM 100 OK
      - "把PWM调到最小"  # 返回 CMD PWM 0 OK
      - "请将PWM设置为{value}"  # 返回 CMD PWM {value} OK
      - "关闭PWM"  # 返回 CMD PWM 0 OK
      - "把PWM调到一半"  # 返回 CMD PWM 50 OK
    mqtt_topic: "mcp2mqtt/pwm"
    response_topic: "mcp2mqtt/pwm/response"

  get_pico_info:
    command: "INFO"
    need_parse: true
    data_type: "ascii"
    prompts:
      - "查询Pico板信息"  # 返回 CMD INFO {设备信息}
      - "显示开发板状态"  # 返回 CMD INFO {设备信息}
    mqtt_topic: "mcp2mqtt/info"
    response_topic: "mcp2mqtt/info/response"

  led_control:
    command: "LED {state}"
    need_parse: true
    data_type: "ascii"
    prompts:
      - "打开LED"  # 返回 CMD LED on OK
      - "关闭LED"  # 返回 CMD LED off OK
      - "设置LED状态为{state}"  # 返回 CMD LED {state} OK
    mqtt_topic: "mcp2mqtt/led"
    response_topic: "mcp2mqtt/led/response"
    
  # --- 修改开始：这里的led_control改为控制HA的灯 ---
  tuya_control:
    command: "{state}"
    need_parse: true
    data_type: "ascii"
    prompts:
      - "打开楼梯灯"  # 发送 'on' 到 HA
      - "关闭楼梯灯"  # 发送 'off' 到 HA
      - "楼梯灯状态设为{state}"  # 发送 {state} 到 HA
    mqtt_topic: "ha/light/lou_ti_deng/set"       # <--- 同样指向HA
    response_topic: "ha/light/lou_ti_deng/state"  # <--- 同样监听HA
  # --- 修改结束 ---
